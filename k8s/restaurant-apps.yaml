---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: restaurant-api
  namespace: default
spec:
  replicas: 1
  selector:
    matchLabels:
      app: restaurant-api
  template:
    metadata:
      labels:
        app: restaurant-api
    spec:
      containers:
      - name: restaurant-api
        image: localhost/restaurant-api:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: ORDER_SERVICE_URL
          value: "http://order-service"
        - name: PAYMENT_GATEWAY_URL
          value: "http://payment-gateway"
        resources:
          requests:
            memory: "64Mi"
            cpu: "50m"
          limits:
            memory: "128Mi"
            cpu: "100m"
---
apiVersion: v1
kind: Service
metadata:
  name: restaurant-api
spec:
  selector:
    app: restaurant-api
  ports:
  - port: 80
    targetPort: 8080
